<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qvibe – Change Password</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@300;400;500;600&display=swap');
  :root{
    --p1:#7B2FFF;--p2:#A855F7;--p3:#C084FC;--glow:rgba(123,47,255,0.4);
    --bg:#0A0A0F;--surface:#111118;--card:#18181F;--border:rgba(123,47,255,0.18);--text:#F0EEFF;--sub:#9B92B8;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:0 0 40px;}

  .topbar{display:flex;align-items:center;gap:12px;padding:14px 20px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
  .back-btn{font-size:22px;cursor:pointer;}
  .topbar-title{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:700;}

  /* ICON */
  .hero{display:flex;flex-direction:column;align-items:center;padding:32px 16px 24px;}
  .hero-icon{width:72px;height:72px;background:rgba(123,47,255,0.15);border:1px solid var(--border);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:34px;margin-bottom:14px;}
  .hero-title{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;margin-bottom:6px;}
  .hero-sub{font-size:13px;color:var(--sub);text-align:center;line-height:1.5;}

  /* FORM */
  .form-wrap{padding:0 16px;}
  .form-group{margin-bottom:18px;}
  .form-label{font-size:12px;color:var(--sub);font-weight:600;margin-bottom:8px;display:block;text-transform:uppercase;letter-spacing:.5px;}
  .input-wrap{position:relative;}
  .input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;}
  .eye-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:16px;cursor:pointer;}
  input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 42px 14px 42px;color:var(--text);font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border-color .3s;}
  input:focus{border-color:var(--p2);box-shadow:0 0 0 3px rgba(123,47,255,0.15);}
  input::placeholder{color:var(--sub);}

  /* STRENGTH BAR */
  .strength-wrap{margin-top:8px;}
  .strength-bars{display:flex;gap:4px;margin-bottom:4px;}
  .strength-bar{flex:1;height:3px;background:var(--border);border-radius:99px;transition:background .3s;}
  .strength-bar.weak{background:#F87171;}
  .strength-bar.medium{background:#FCD34D;}
  .strength-bar.strong{background:#34D399;}
  .strength-text{font-size:11px;color:var(--sub);}

  /* RULES */
  .rules{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:20px;}
  .rule{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--sub);margin-bottom:8px;}
  .rule:last-child{margin-bottom:0;}
  .rule-icon{font-size:14px;}
  .rule.pass{color:#34D399;}
  .rule.pass .rule-icon::before{content:'✅';}
  .rule-icon::before{content:'⚪';}

  /* BTN */
  .btn-main{width:100%;padding:15px;background:linear-gradient(135deg,var(--p1),var(--p2));color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;box-shadow:0 4px 20px var(--glow);transition:all .3s;margin-bottom:12px;}
  .btn-main:hover{opacity:.9;transform:translateY(-1px);}
  .btn-forgot{width:100%;padding:12px;background:transparent;border:1px solid var(--border);border-radius:14px;color:var(--p3);font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;}
  .btn-forgot:hover{border-color:var(--p2);}

  /* SUCCESS */
  .success-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999;opacity:0;pointer-events:none;transition:opacity .4s;}
  .success-overlay.show{opacity:1;pointer-events:all;}
  .success-icon{font-size:64px;animation:bounceIn .5s cubic-bezier(0.34,1.56,0.64,1);}
  .success-title{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;}
  .success-sub{font-size:14px;color:var(--sub);}
  @keyframes bounceIn{0%{transform:scale(0);}100%{transform:scale(1);}}
</style>
</head>
<body>

<div class="topbar">
  <div class="back-btn" onclick="window.location.href='settings.html'">←</div>
  <div class="topbar-title">Change Password</div>
</div>

<div class="hero">
  <div class="hero-icon">🔐</div>
  <div class="hero-title">Update Password</div>
  <div class="hero-sub">Choose a strong password to keep your Qvibe account safe 💜</div>
</div>

<div class="form-wrap">

  <div class="form-group">
    <label class="form-label">Current Password</label>
    <div class="input-wrap">
      <span class="input-icon">🔒</span>
      <input type="password" id="currentPass" placeholder="Enter current password">
      <span class="eye-btn" onclick="togglePass('currentPass',this)">👁️</span>
    </div>
  </div>

  <div class="form-group">
    <label class="form-label">New Password</label>
    <div class="input-wrap">
      <span class="input-icon">🔑</span>
      <input type="password" id="newPass" placeholder="Enter new password" oninput="checkStrength(this.value)">
      <span class="eye-btn" onclick="togglePass('newPass',this)">👁️</span>
    </div>
    <div class="strength-wrap">
      <div class="strength-bars">
        <div class="strength-bar" id="bar1"></div>
        <div class="strength-bar" id="bar2"></div>
        <div class="strength-bar" id="bar3"></div>
        <div class="strength-bar" id="bar4"></div>
      </div>
      <div class="strength-text" id="strengthText">Enter a password</div>
    </div>
  </div>

  <div class="form-group">
    <label class="form-label">Confirm New Password</label>
    <div class="input-wrap">
      <span class="input-icon">🔑</span>
      <input type="password" id="confirmPass" placeholder="Confirm new password">
      <span class="eye-btn" onclick="togglePass('confirmPass',this)">👁️</span>
    </div>
  </div>

  <!-- RULES -->
  <div class="rules">
    <div class="rule" id="rule1"><span class="rule-icon"></span> At least 8 characters</div>
    <div class="rule" id="rule2"><span class="rule-icon"></span> Contains a number</div>
    <div class="rule" id="rule3"><span class="rule-icon"></span> Contains uppercase letter</div>
    <div class="rule" id="rule4"><span class="rule-icon"></span> Contains special character</div>
  </div>

  <button class="btn-main" onclick="changePassword()">Update Password 🔐</button>
  <button class="btn-forgot" onclick="window.location.href='login.html'">Forgot Password?</button>
</div>

<!-- SUCCESS -->
<div class="success-overlay" id="successOverlay">
  <div class="success-icon">✅</div>
  <div class="success-title">Password Updated!</div>
  <div class="success-sub">Your account is now more secure 💜</div>
</div>

<script>
  function togglePass(id, btn){
    const input = document.getElementById(id);
    if(input.type === 'password'){
      input.type = 'text';
      btn.textContent = '🙈';
    } else {
      input.type = 'password';
      btn.textContent = '👁️';
    }
  }

  function checkStrength(val){
    const bars = [document.getElementById('bar1'),document.getElementById('bar2'),document.getElementById('bar3'),document.getElementById('bar4')];
    const r1 = val.length >= 8;
    const r2 = /\d/.test(val);
    const r3 = /[A-Z]/.test(val);
    const r4 = /[^A-Za-z0-9]/.test(val);

    // Rules
    document.getElementById('rule1').className = 'rule' + (r1?' pass':'');
    document.getElementById('rule2').className = 'rule' + (r2?' pass':'');
    document.getElementById('rule3').className = 'rule' + (r3?' pass':'');
    document.getElementById('rule4').className = 'rule' + (r4?' pass':'');

    const score = [r1,r2,r3,r4].filter(Boolean).length;
    bars.forEach(b=>b.className='strength-bar');
    const strengthText = document.getElementById('strengthText');

    if(score === 0){strengthText.textContent='Enter a password';}
    else if(score === 1){bars[0].classList.add('weak');strengthText.textContent='Weak 😟';}
    else if(score === 2){bars[0].classList.add('medium');bars[1].classList.add('medium');strengthText.textContent='Fair 😐';}
    else if(score === 3){bars[0].classList.add('strong');bars[1].classList.add('strong');bars[2].classList.add('strong');strengthText.textContent='Good 😊';}
    else{bars.forEach(b=>b.classList.add('strong'));strengthText.textContent='Strong 💪';}
  }

  function changePassword(){
    const curr = document.getElementById('currentPass').value;
    const newP = document.getElementById('newPass').value;
    const conf = document.getElementById('confirmPass').value;

    if(!curr){alert('Enter current password!');return;}
    if(newP.length < 8){alert('Password must be at least 8 characters!');return;}
    if(newP !== conf){alert('Passwords do not match!');return;}

    const overlay = document.getElementById('successOverlay');
    overlay.classList.add('show');
    setTimeout(()=>{window.location.href='settings.html';},2000);
  }
</script>
</body>
</html>
