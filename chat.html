<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qvibe – Chat</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@300;400;500;600&display=swap');
  :root{
    --p1:#7B2FFF;--p2:#A855F7;--p3:#C084FC;--glow:rgba(123,47,255,0.4);
    --bg:#0A0A0F;--surface:#111118;--card:#18181F;--border:rgba(123,47,255,0.18);--text:#F0EEFF;--sub:#9B92B8;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:100px;}

  /* TOPBAR */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
  .topbar-title{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;}
  .icon-btn{width:36px;height:36px;background:var(--card);border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;}

  /* SEARCH */
  .search-wrap{padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);}
  .search-box{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 14px;}
  .search-box input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:14px;font-family:'Inter',sans-serif;}
  .search-box input::placeholder{color:var(--sub);}

  /* ACTIVE NOW */
  .active-section{padding:14px 16px;border-bottom:1px solid var(--border);}
  .section-label{font-size:12px;color:var(--sub);font-weight:600;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px;}
  .active-list{display:flex;gap:14px;overflow-x:auto;scrollbar-width:none;}
  .active-list::-webkit-scrollbar{display:none;}
  .active-user{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0;cursor:pointer;}
  .active-avatar{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--p1),var(--p3));display:flex;align-items:center;justify-content:center;font-size:22px;position:relative;border:2px solid var(--p2);}
  .active-dot{position:absolute;bottom:1px;right:1px;width:12px;height:12px;background:#22C55E;border-radius:50%;border:2px solid var(--bg);}
  .active-name{font-size:11px;color:var(--sub);}

  /* CHAT LIST */
  .chat-list{display:flex;flex-direction:column;}
  .chat-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .2s;position:relative;}
  .chat-item:hover{background:var(--surface);}
  .chat-item.unread{background:rgba(123,47,255,0.05);}
  .chat-avatar{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--p1),var(--p3));display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;position:relative;}
  .online-dot{position:absolute;bottom:2px;right:2px;width:12px;height:12px;background:#22C55E;border-radius:50%;border:2px solid var(--bg);}
  .chat-info{flex:1;min-width:0;}
  .chat-name{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;margin-bottom:3px;}
  .chat-preview{font-size:13px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .chat-item.unread .chat-preview{color:var(--text);font-weight:500;}
  .chat-meta{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
  .chat-time{font-size:11px;color:var(--sub);}
  .unread-badge{background:linear-gradient(135deg,var(--p1),var(--p2));color:#fff;font-size:11px;font-weight:700;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;}

  /* FLOATING NAV */
  .bottom-nav{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);width:calc(100% - 40px);max-width:420px;background:rgba(17,17,24,0.6);backdrop-filter:blur(24px);border:1px solid rgba(123,47,255,0.25);border-radius:28px;display:flex;justify-content:space-around;align-items:center;padding:10px 8px;z-index:100;box-shadow:0 8px 32px rgba(0,0,0,0.4);}
  .nav-item{display:flex;flex-direction:column;align-items:center;cursor:pointer;padding:8px 14px;border-radius:18px;transition:all .3s cubic-bezier(0.34,1.56,0.64,1);}
  .nav-icon{font-size:22px;filter:grayscale(1) opacity(0.5);transition:all .3s cubic-bezier(0.34,1.56,0.64,1);}
  .nav-item.active .nav-icon{filter:grayscale(0) opacity(1);transform:translateY(-3px) scale(1.15);}
  .nav-item.active{background:rgba(123,47,255,0.18);}
  .nav-glow{width:5px;height:5px;background:var(--p2);border-radius:50%;margin-top:3px;opacity:0;transition:opacity .3s;}
  .nav-item.active .nav-glow{opacity:1;animation:glowPulse 2s ease-in-out infinite;}
  .nav-post-btn{width:50px;height:50px;background:linear-gradient(135deg,var(--p1),var(--p3));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;cursor:pointer;box-shadow:0 4px 20px var(--glow);transition:all .3s;margin-top:-6px;}
  .nav-post-btn:hover{transform:scale(1.12) translateY(-4px);}
  @keyframes glowPulse{0%,100%{box-shadow:0 0 6px var(--p2);}50%{box-shadow:0 0 16px var(--p1);}}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-title">Messages</div>
  <div class="icon-btn">✏️</div>
</div>

<!-- SEARCH -->
<div class="search-wrap">
  <div class="search-box">
    <span>🔍</span>
    <input type="text" placeholder="Search messages...">
  </div>
</div>

<!-- ACTIVE NOW -->
<div class="active-section">
  <div class="section-label">Active Now</div>
  <div class="active-list">
    <div class="active-user">
      <div class="active-avatar">🎨<div class="active-dot"></div></div>
      <span class="active-name">Ariya</span>
    </div>
    <div class="active-user">
      <div class="active-avatar" style="background:linear-gradient(135deg,#0EA5E9,#7B2FFF)">🌙<div class="active-dot"></div></div>
      <span class="active-name">Zayan</span>
    </div>
    <div class="active-user">
      <div class="active-avatar" style="background:linear-gradient(135deg,#F59E0B,#A855F7)">🎵<div class="active-dot"></div></div>
      <span class="active-name">Lina</span>
    </div>
    <div class="active-user">
      <div class="active-avatar" style="background:linear-gradient(135deg,#EC4899,#7B2FFF)">🔥<div class="active-dot"></div></div>
      <span class="active-name">Nova</span>
    </div>
    <div class="active-user">
      <div class="active-avatar" style="background:linear-gradient(135deg,#10B981,#7B2FFF)">🌿<div class="active-dot"></div></div>
      <span class="active-name">Rehan</span>
    </div>
  </div>
</div>

<!-- CHAT LIST -->
<div class="chat-list">

  <div class="chat-item unread" onclick="window.location.href='conversation.html'">
    <div class="chat-avatar">🎨<div class="online-dot"></div></div>
    <div class="chat-info">
      <div class="chat-name">Ariya Noor</div>
      <div class="chat-preview">💜 Loved your latest post!</div>
    </div>
    <div class="chat-meta">
      <span class="chat-time">2m</span>
      <div class="unread-badge">3</div>
    </div>
  </div>

  <div class="chat-item unread" onclick="window.location.href='conversation.html'">
    <div class="chat-avatar" style="background:linear-gradient(135deg,#0EA5E9,#7B2FFF)">🌙<div class="online-dot"></div></div>
    <div class="chat-info">
      <div class="chat-name">Zayan K.</div>
      <div class="chat-preview">Bro that vibe was 🔥🔥</div>
    </div>
    <div class="chat-meta">
      <span class="chat-time">15m</span>
      <div class="unread-badge">1</div>
    </div>
  </div>

  <div class="chat-item" onclick="window.location.href='conversation.html'">
    <div class="chat-avatar" style="background:linear-gradient(135deg,#F59E0B,#A855F7)">🎵</div>
    <div class="chat-info">
      <div class="chat-name">Lina Beats</div>
      <div class="chat-preview">You: Check out my new track 🎵</div>
    </div>
    <div class="chat-meta">
      <span class="chat-time">1h</span>
    </div>
  </div>

  <div class="chat-item" onclick="window.location.href='conversation.html'">
    <div class="chat-avatar" style="background:linear-gradient(135deg,#EC4899,#7B2FFF)">🔥<div class="online-dot"></div></div>
    <div class="chat-info">
      <div class="chat-name">Nova Hasan</div>
      <div class="chat-preview">When are you posting next? 👀</div>
    </div>
    <div class="chat-meta">
      <span class="chat-time">3h</span>
    </div>
  </div>

  <div class="chat-item" onclick="window.location.href='conversation.html'">
    <div class="chat-avatar" style="background:linear-gradient(135deg,#10B981,#7B2FFF)">🌿</div>
    <div class="chat-info">
      <div class="chat-name">Rehan Mir</div>
      <div class="chat-preview">Thanks for the follow! ✨</div>
    </div>
    <div class="chat-meta">
      <span class="chat-time">1d</span>
    </div>
  </div>

</div>

<!-- FLOATING NAV -->
<div class="bottom-nav">
  <div class="nav-item" onclick="window.location.href='index.html'">
    <span class="nav-icon">🏠</span>
    <div class="nav-glow"></div>
  </div>
  <div class="nav-item" onclick="setNav(this)">
    <span class="nav-icon">🔍</span>
    <div class="nav-glow"></div>
  </div>
  <div class="nav-item">
    <div class="nav-post-btn">✦</div>
  </div>
  <div class="nav-item active">
    <span class="nav-icon">💬</span>
    <div class="nav-glow"></div>
  </div>
  <div class="nav-item" onclick="window.location.href='profile.html'">
    <span class="nav-icon">👤</span>
    <div class="nav-glow"></div>
  </div>
</div>

<script>
  function setNav(item){
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    item.classList.add('active');
  }
</script>
</body>
</html>
